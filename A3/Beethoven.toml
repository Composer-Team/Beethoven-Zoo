# Beethoven project manifest for the A3 attention ZU3 demo.

[project]
name = "a3"

[hardware]
src-dir = "hw"

[hardware.beethoven-hardware]
# Use the published framework artifact so a standalone Zoo clone can build.
version = "latest.integration"

[software]
src-dir = "sw"

[platform]
target = "aupzu3"
simulator = "icarus"

[platform.aupzu3]
dram-size-gb = 4
memory-channels = 1
clock-rate-mhz = 100

[build]
output-dir = "target"
