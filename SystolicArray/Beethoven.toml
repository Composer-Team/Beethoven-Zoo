# Beethoven project manifest for the systolic-array simulation demo.

[project]
name = "systolic_array"

[hardware]
src-dir = "hw"

[hardware.beethoven-hardware]
# Beethoven-Zoo is expected to be cloned next to Beethoven-Hardware.
path = "../../Beethoven-Hardware"

[software]
src-dir = "sw"

[platform]
target = "default"
simulator = "icarus"

[platform.default]
clock-rate-mhz = 100

[build]
output-dir = "target"
