# Beethoven project manifest for the ZU3 Game Boy emulator.

[project]
name = "gameboy"

[hardware]
src-dir = "hw"

[hardware.beethoven-hardware]
# Use the published framework artifact so a standalone Zoo clone can build.
version = "latest.integration"

[software]
src-dir = "sw"
default-testbench = "gameboy_status_tb"

[platform]
target = "aupzu3"
simulator = "verilator"

[platform.aupzu3]
dram-size-gb = 4
memory-channels = 1
clock-rate-mhz = 100

[build]
output-dir = "target"
