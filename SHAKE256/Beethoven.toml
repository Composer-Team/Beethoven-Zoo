# Beethoven project manifest for the SHAKE256 LWR-PRF simulation demo.

[project]
name = "shake256_lwr"

[hardware]
src-dir = "hw"

[hardware.beethoven-hardware]
# Use the published framework artifact so a standalone Zoo clone can build.
version = "latest.integration"

[software]
src-dir = "sw"

[platform]
target = "default"
simulator = "icarus"

[platform.default]
clock-rate-mhz = 100

[build]
output-dir = "target"
